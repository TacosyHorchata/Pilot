<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 220px;
      padding: 16px;
      margin: 0;
      background: #0f0f0f;
      color: #f5f5f5;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .logo {
      font-size: 18px;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.01em;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 8px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #22c55e; box-shadow: 0 0 6px #22c55e80; }
    .dot.disconnected { background: #6b7280; }
    .status-text {
      font-size: 12px;
      color: #a1a1aa;
    }
    .hint {
      margin-top: 10px;
      font-size: 11px;
      color: #52525b;
      line-height: 1.5;
    }
    a { color: #6366f1; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">✈️</span>
    <h1>Pilot MCP</h1>
  </div>
  <div class="status">
    <div class="dot disconnected" id="dot"></div>
    <span class="status-text" id="status-text">Connecting...</span>
  </div>
  <p class="hint" id="hint">Make sure Pilot MCP is running in Claude Code.</p>
  <script src="popup.js"></script>
</body>
</html>
